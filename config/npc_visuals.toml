# ============================================================
# npc_visuals.toml — Datos visuales y de sonido de NPCs (solo cliente)
#
# Complementa a config/npcs.toml (catálogo de gameplay compartido con el
# servidor) con la info de spritesheet que sólo le importa al cliente.
#
# select_mode:
#   "entity_id"   -> la variante a dibujar/sonar se elige con entity_id % N
#                    (da variedad estable entre enemigos del mismo tipo).
#   "position_y"  -> se elige con pos_y > position_y_threshold (NPCs de
#                    servicio: variante 0 = ciudad, variante 1 = pueblo).
#
# Cada variante: sheet, cols/rows/frame_w/frame_h (layout del spritesheet),
# draw_offset_y (corrimiento vertical al dibujar), name_label_offset_y
# (offset del cartel de nombre, sólo relevante en NPCs de servicio) y
# death_sound (clave dentro de audio_config.toml [creature_sounds]).
# ============================================================

# ── Enemigos ─────────────────────────────────────────────────
[npc_visual.1]   # GOBLIN
is_service  = false
scale       = 1.5
select_mode = "entity_id"
variants = [
  { sheet = "assets/npcs/goblin/duende_ladron.png",      cols = 7, rows = 4, frame_w = 25, frame_h = 32, death_sound = "goblin" },
  { sheet = "assets/npcs/goblin/duende_zombie_real.png", cols = 8, rows = 4, frame_w = 64, frame_h = 67, death_sound = "goblin" },
]

