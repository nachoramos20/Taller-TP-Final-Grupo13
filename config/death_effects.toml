# ============================================================
# death_effects.toml — Efectos de muerte
# Define sprites de sangre y animación de muerte
# ============================================================

[death_animation]
# Número de frames (imágenes sangre_1.png ... sangre_5.png)
frames              = 5
# Milisegundos entre cambio de frame (para frames 1-4)
frame_duration_ms   = 150
# Milisegundos que permanece el último frame (sangre final)
linger_duration_ms  = 2500
# Duración total = 150 * 4 + 2500 = 3100
total_duration_ms   = 3100

[death_sprites]
# Patrón de ruta: "assets/sprites/stage/sangre_{frame_number}.png"
base_path           = "assets/sprites/stage/sangre_"
