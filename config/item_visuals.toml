icon_path  = "assets/sprites/weapons/sword/espada.png"
equip_path = "assets/sprites/weapons/sword/espada.png"
attack_sound_category   = "melee"
attack_sound_key         = "espada"
melee_finisher_sound_key = "golpe_final_espada"

