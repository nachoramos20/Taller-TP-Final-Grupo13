# ============================================================
# item_visuals.toml — Datos visuales y de sonido de ítems (solo cliente)
#
# Complementa a config/items.toml (catálogo de gameplay compartido con el
# servidor) con todo lo que sólo le importa al cliente para dibujar:
#   icon_path   : ícono en el panel de inventario
#   equip_path  : overlay dibujado sobre el personaje al equiparse (vacío si
#                 el ítem no se ve sobre el cuerpo, p. ej. pociones/oro)
#   attack_sound_category/key : dónde buscar en audio_config.toml el sonido
#                 de ataque básico de esta arma ("melee" | "ranged" | "magic")
#   melee_finisher_sound_key  : sonido extra al dar el golpe final con esta
#                 arma equipada (sólo la espada lo tiene)
#   [item.N.helmet] : sólo para cascos — rect de origen en el spritesheet y
#                 offset por raza/dirección (orden: sur, norte, oeste, este)
# ============================================================

# ── Armas cuerpo a cuerpo ────────────────────────────────────
