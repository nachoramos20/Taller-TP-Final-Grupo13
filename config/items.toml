# ============================================================
# items.toml — Catálogo completo de ítems del juego
#
# Campos por ítem:
#   kind        : tipo (weapon_melee | weapon_ranged | weapon_magic |
#                        armor | helmet | shield | potion | gold)
#   name        : nombre visible
#   min_value   : daño mínimo (armas) / defensa mínima (armaduras)
#   max_value   : daño máximo / defensa máxima
#   mana_cost   : mana consumido en ataque básico (solo weapon_magic)
#   range_tiles : alcance en tiles (armas a distancia/mágicas)
#   sprite      : ruta al spritesheet del ítem (se usa en cliente)
#   sprite_x    : columna en el spritesheet (px)
#   sprite_y    : fila en el spritesheet (px)
#   sprite_w    : ancho del frame (px)
#   sprite_h    : alto del frame (px)
# ============================================================

