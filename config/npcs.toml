# ============================================================
# npcs.toml — Catálogo de NPCs del juego
#
# Campos:
#   name             : nombre visible
#   max_hp           : vida máxima
#   dmg_min/max      : daño mínimo/máximo por ataque
#   defense_min/max  : defensa mínima/máxima
#   attack_range     : distancia máxima de ataque (tiles)
#   move_cooldown    : ticks entre movimientos
#   attack_cooldown  : ticks entre ataques
#   exp_reward       : EXP fija al matar
#   gold_min/max     : rango de oro al matar
#   is_service       : true = NPC de servicio (no combate)
#   sprite           : ruta al png del NPC
#   sprite_w/h       : tamaño del frame del sprite
#   drop_items       : lista de ItemId que puede dropear
# ============================================================

