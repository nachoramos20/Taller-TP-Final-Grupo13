# ============================================================
# spells.toml — Catálogo de hechizos por clase
#
# Campos:
#   name            : nombre visible del hechizo
#   class           : clase que puede usarlo (1=Mago, 2=Clerigo, 3=Paladin)
#   mana_cost       : mana consumido al lanzar
#   dmg_multiplier  : multiplicador sobre el daño base del arma
#   flat_bonus      : daño plano adicional (antes del bonus de INT)
#   range           : alcance máximo en tiles (manhattan)
#   sprite          : path del spritesheet de animación
#   sprite_frames   : cantidad de frames de la animación
#   sprite_w        : ancho de cada frame (px)
#   sprite_h        : alto de cada frame (px)
# ============================================================

